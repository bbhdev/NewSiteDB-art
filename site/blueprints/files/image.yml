# Image file blueprint — Phase 2 Slice 2 step 3 (v0.10.29).
#
# Used for files attached to an `image-container` child page (the
# per-canvas-page /images/ subdir that the page.create:after hook
# auto-creates). The blueprint deliberately omits a `create:` section
# (Kirby v4+ feature for upload-time transforms) — the architectural
# decision (see HANDOFF "image pipeline") is preserve-originals-derive-
# lazily: source files are kept intact, the runtime asks for thumbs
# at the rect's display size via $file->thumb($width). One narrow
# exception: an optional `maxLongEdge` field, applied via a
# file.update:after hook in site/config/config.php — used only when
# an author explicitly opts in to capping a specific source file.
#
# Mime restriction: image/* only. PDF / video / audio are not in
# Phase 2 scope and would silently break the runtime renderer.

accept:
  mime: image/*

fields:
  alt:
    label: Alt text
    type: text
    help: >
      Short description of the image for screen readers and as a
      fallback when the image can't load. Leave blank for purely
      decorative images.
  caption:
    label: Caption
    type: textarea
    size: small
    help: Optional visible caption. Rendering is per-rect.
  previewLongEdge:
    label: Preview long edge (px)
    type: number
    min: 200
    max: 8000
    step: 1
    help: >
      Test a resize without overwriting the source. After saving,
      a link appears in the field below pointing to the resized
      thumb generated by Kirby's thumb engine. If the result is
      good, copy this value into "Max long edge" and save again
      to commit. Leave empty when not trialling.
  previewInfo:
    label: Preview thumb
    type: info
    text: |
      Source: **{{ file.width }} × {{ file.height }} px**,
      {{ file.niceSize }}. Trial cap (long edge):
      **{{ file.previewLongEdge.or('—') }}**.

      [Open resized preview]({{ file.resize(file.previewLongEdge.or(1000).toInt, file.previewLongEdge.or(1000).toInt).url }})
      — Kirby fits the image inside a
      {{ file.previewLongEdge.or(1000) }}-px box (long edge binds,
      aspect preserved, no cropping), generates the file on first
      request and caches it. Source is not modified.

      When the result satisfies you, copy the same value into
      "Max long edge" and save to commit (overwrites source).
  maxLongEdge:
    label: Max long edge (px)
    type: number
    min: 200
    max: 8000
    step: 1
    help: >
      Optional one-time cap on the source file's long edge in pixels.
      When set and saved, the original is resized down to this
      dimension and this field is cleared. Leave empty for the normal
      preserve-originals flow (the runtime derives display-size thumbs
      automatically and the source stays intact).
