# Image workshop batch — Phase 2 Slice 2 workshop (v0.10.33).
#
# A single triage workspace: a pile of candidate images tested through
# the Deco resize pipeline. Files use the shared `image` blueprint so
# they carry the same alt / caption / preview / maxLongEdge fields as
# canvas-page images — an image that passes triage here can be moved
# into a canvas-page's library unchanged. The visual grid (original vs.
# resized at a chosen long edge) is rendered by the
# image-workshop-batch.php template at /dev/image-workshop/<slug>.
#
# v0.10.192 (4g-3c) — Panel navigation affordance. The page-header
# button bar keeps the Panel defaults (settings/preview/status) and adds
# "Open batch in Deco", a deep link straight into the editor's Images
# mode with this batch pre-selected: /dev/editor?mode=images&batch=<id>.
# `{{ page.id }}` resolves to the full path id (e.g.
# `dev/image-workshop/batch-1`), which the editor reads via
# URLSearchParams('batch') and matches against the batch <select>'s
# option values. v0.10.193 — opens in the SAME tab (no target: _blank):
# forcing a new tab is wrong (the browser already offers cmd/ctrl-click
# for that when the user wants it). v0.10.194 — the link MUST be an
# ABSOLUTE url ({{ site.url }}/…). A leading-slash path ("/dev/editor")
# was parsed by the Panel SPA router as an internal Panel view, giving
# "Could not find Panel view for route: dev/editor". A full http(s) URL
# is treated as an external link → real navigation to the front-end route.
#
# v0.11.1 — "Open batch in Workshop" sibling button. After the editor
# consolidation, the standalone Image Workshop UI (image-workshop-batch.php
# at /dev/image-workshop/<slug>) lost its direct entry point — the panel
# batch page only deep-linked into Deco's Images mode. This restores it.
# Link is `{{ page.url }}`: the batch's OWN front-end URL, identical to what
# the workshop INDEX (image-workshop.php) already links to via `$b->url()`.
# Absolute (Panel SPA treats it as external → real navigation, same as deco)
# and resolves a DRAFT batch's URL correctly (drafts render for the
# logged-in panel session).

title: Batch

buttons:
  settings: true
  preview: true
  status: true
  deco:
    text: Open batch in Deco
    icon: edit
    theme: love
    link: "{{ site.url }}/dev/editor?mode=images&batch={{ page.id }}"
  workshop:
    text: Open batch in Workshop
    icon: image
    theme: info
    link: "{{ page.url }}"

columns:
  main:
    width: 1/1
    sections:
      info:
        type: info
        headline: Triage view
        text: >
          Drop candidate images below, then open this batch's workshop
          view at `/dev/image-workshop/{{ page.slug }}` to compare each
          original against its resized derivative. Adjust the test long
          edge in that view's toolbar. Originals are never modified by
          the comparison.
      files:
        type: files
        template: image
        info: "{{ file.dimensions }} · {{ file.niceSize }}"
        sortBy: filename asc
